<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ LogSentinel Dashboard</title>
    <style>
        /* ===== RESET & BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            color: #e4e4e7;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00d9ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .subtitle {
            color: #8888aa;
            font-size: 1.1rem;
            margin-bottom: 25px;
            font-weight: 400;
        }

        .system-info {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        /* ===== BADGES ===== */
        .badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-service {
            background: linear-gradient(135deg, #1e3a5f, #0f3460);
            color: #7dd3fc;
            border: 1px solid #0ea5e9;
        }

        .badge-danger {
            background: linear-gradient(135deg, #7f1d1d, #450a0a);
            color: #fca5a5;
            border: 1px solid #ef4444;
            animation: pulse 2s infinite;
        }

        .badge-safe {
            background: linear-gradient(135deg, #14532d, #052e16);
            color: #86efac;
            border: 1px solid #22c55e;
        }

        .badge-os {
            background: linear-gradient(135deg, #374151, #1f2937);
            color: #d1d5db;
            border: 1px solid #6b7280;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
        }

        /* ===== ACTIONS ===== */
        .actions {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d9ff, #00a8cc);
            color: #0a0a1a;
            box-shadow: 0 4px 14px rgba(0, 217, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 217, 255, 0.6);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #1e3a5f, #0f3460);
            color: #7dd3fc;
            border: 2px solid #0ea5e9;
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #0f3460, #1e3a5f);
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ===== STATS CARDS ===== */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 35px;
        }

        .stat-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #334155;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00d9ff, #7b2cbf);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: #0ea5e9;
            box-shadow: 0 10px 40px rgba(0, 217, 255, 0.15);
        }

        .stat-card.danger::before {
            background: linear-gradient(90deg, #ef4444, #f97316);
        }

        .stat-card.safe::before {
            background: linear-gradient(90deg, #22c55e, #10b981);
        }

        .stat-card h3 {
            color: #94a3b8;
            font-size: 12px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .stat-card .value {
            font-size: 42px;
            font-weight: 800;
            color: #00d9ff;
            line-height: 1;
        }

        .stat-card.danger .value {
            color: #f87171;
        }

        .stat-card.safe .value {
            color: #4ade80;
        }

        /* ===== TABLE ===== */
        .table-container {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #334155;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .logs-table {
            width: 100%;
            border-collapse: collapse;
        }

        .logs-table th {
            background: linear-gradient(135deg, #0f3460, #1e3a5f);
            color: #7dd3fc;
            padding: 18px 20px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            border-bottom: 2px solid #0ea5e9;
        }

        .logs-table td {
            padding: 16px 20px;
            border-bottom: 1px solid #1e293b;
            vertical-align: top;
        }

        .logs-table tr {
            transition: all 0.2s ease;
        }

        .logs-table tr:hover {
            background: rgba(14, 165, 233, 0.08);
        }

        .logs-table tr.suspicious {
            background: rgba(239, 68, 68, 0.12);
            border-left: 4px solid #ef4444;
        }

        .logs-table tr.suspicious:hover {
            background: rgba(239, 68, 68, 0.18);
        }

        .logs-table td:nth-child(3) {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            color: #cbd5e1;
            max-width: 500px;
            word-break: break-word;
        }

        /* ===== LOADING & EMPTY STATES ===== */
        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #334155;
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #64748b;
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .stats { grid-template-columns: 1fr; }
            .actions { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
            .logs-table { font-size: 13px; }
            .logs-table th, .logs-table td { padding: 12px 15px; }
            .logs-table td:nth-child(3) { font-size: 12px; }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #334155, #475569);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #475569, #64748b);
        }

        /* ===== TOAST NOTIFICATION ===== */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
            z-index: 1000;
            max-width: 350px;
        }

        .toast.success {
            background: linear-gradient(135deg, #166534, #14532d);
            border: 1px solid #22c55e;
        }

        .toast.error {
            background: linear-gradient(135deg, #991b1b, #7f1d1d);
            border: 1px solid #ef4444;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(100%); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <h1>🛡️ LogSentinel</h1>
        <p class="subtitle">AI-Powered Log Anomaly Detection for Windows & Linux</p>
        
        <!-- System Info Badges -->
        <div class="system-info" id="systemInfo">
            <span class="badge badge-os">🖥️ Loading...</span>
        </div>
        
        <!-- Action Buttons -->
        <div class="actions">
            <button class="btn btn-primary" onclick="analyzeLogs()">
                🔍 Run Anomaly Detection
            </button>
            <button class="btn btn-secondary" onclick="refreshLogs()">
                🔄 Refresh Logs
            </button>
        </div>
        
        <!-- Stats Cards -->
        <div class="stats">
            <div class="stat-card">
                <h3>📊 Total Logs</h3>
                <div class="value" id="totalLogs">0</div>
            </div>
            <div class="stat-card danger">
                <h3>⚠️ Suspicious</h3>
                <div class="value" id="suspiciousLogs">0</div>
            </div>
            <div class="stat-card safe">
                <h3>🔒 Security Score</h3>
                <div class="value" id="securityScore">100%</div>
            </div>
        </div>
        
        <!-- Logs Table -->
        <div class="table-container">
            <table class="logs-table">
                <thead>
                    <tr>
                        <th>⏰ Timestamp</th>
                        <th>🔧 Service</th>
                        <th>📝 Message</th>
                        <th>🎯 Status</th>
                    </tr>
                </thead>
                <tbody id="logsBody">
                    <tr>
                        <td colspan="4" class="loading">Loading logs</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <script>
        // ===== TOAST NOTIFICATIONS =====
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span>${type === 'success' ? '✅' : '❌'}</span>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }

        // ===== LOAD LOGS =====
        async function loadLogs() {
            try {
                const response = await fetch('/api/logs');
                const logs = await response.json();
                
                const tbody = document.getElementById('logsBody');
                tbody.innerHTML = '';
                
                if (logs.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="4" class="empty-state">
                                <div>📭</div>
                                <p>No logs found. Click "Refresh Logs" to load system events.</p>
                            </td>
                        </tr>
                    `;
                    updateStats(0, 0);
                    return;
                }
                
                let suspicious = 0;
                logs.forEach(log => {
                    const row = document.createElement('tr');
                    if (log.suspicion_score === 1) {
                        row.classList.add('suspicious');
                        suspicious++;
                    }
                    
                    // Truncate long messages
                    const message = log.message.length > 150 
                        ? log.message.substring(0, 150) + '...' 
                        : log.message;
                    
                    row.innerHTML = `
                        <td><span style="color:#94a3b8;font-size:13px">${log.timestamp}</span></td>
                        <td><span class="badge badge-service">${log.service}</span></td>
                        <td title="${log.message}">${message}</td>
                        <td>
                            <span class="badge ${log.suspicion_score === 1 ? 'badge-danger' : 'badge-safe'}">
                                ${log.suspicion_score === 1 ? '⚠️ Suspicious' : '✅ Normal'}
                            </span>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
                
                updateStats(logs.length, suspicious);
            } catch (error) {
                console.error('Error loading logs:', error);
                document.getElementById('logsBody').innerHTML = 
                    `<tr><td colspan="4" style="text-align:center;color:#f87171;padding:30px">
                        ❌ Error loading logs. Check console for details.
                    </td></tr>`;
                showToast('Failed to load logs', 'error');
            }
        }

        // ===== UPDATE STATS =====
        function updateStats(total, suspicious) {
            document.getElementById('totalLogs').textContent = total;
            document.getElementById('suspiciousLogs').textContent = suspicious;
            const score = total > 0 ? Math.round(((total - suspicious) / total) * 100) : 100;
            
            // Animate score change
            const scoreEl = document.getElementById('securityScore');
            const currentScore = parseInt(scoreEl.textContent) || 100;
            animateValue(scoreEl, currentScore, score, 500);
        }

        function animateValue(element, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const value = Math.floor(progress * (end - start) + start);
                element.textContent = value + '%';
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        // ===== RUN ANOMALY DETECTION =====
        async function analyzeLogs() {
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '⏳ Analyzing...';
            
            try {
                const response = await fetch('/api/analyze', { method: 'POST' });
                const result = await response.json();
                
                if (result.status === 'success') {
                    showToast(`Found ${result.anomalies} anomalies in ${result.analyzed} logs`);
                    loadLogs();
                } else {
                    showToast(result.message || 'Analysis failed', 'error');
                }
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
            }
            
            btn.disabled = false;
            btn.innerHTML = originalText;
        }

        // ===== REFRESH LOGS =====
        async function refreshLogs() {
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '⏳ Refreshing...';
            
            try {
                const response = await fetch('/api/refresh', { method: 'POST' });
                const result = await response.json();
                
                if (result.status === 'refreshed') {
                    showToast('Logs refreshed successfully!');
                    loadLogs();
                } else {
                    showToast('Refresh failed', 'error');
                }
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
            }
            
            btn.disabled = false;
            btn.innerHTML = originalText;
        }

        // ===== LOAD SYSTEM INFO =====
        async function loadSystemInfo() {
            try {
                const response = await fetch('/api/system-info');
                const info = await response.json();
                
                const osBadge = info.os === 'Windows' ? '🪟' : info.os === 'Linux' ? '🐧' : '💻';
                document.getElementById('systemInfo').innerHTML = `
                    <span class="badge badge-os">${osBadge} ${info.os}</span>
                    <span class="badge badge-service">🖥️ ${info.computer_name}</span>
                    <span class="badge ${info.log_source === 'real' ? 'badge-safe' : 'badge-danger'}">
                        ${info.log_source === 'real' ? '📁 Real Logs' : '🧪 Sample Data'}
                    </span>
                `;
            } catch (error) {
                console.error('Error loading system info:', error);
            }
        }

        // ===== INITIALIZE =====
        document.addEventListener('DOMContentLoaded', () => {
            loadLogs();
            loadSystemInfo();
            // Auto-refresh logs every 30 seconds
            setInterval(loadLogs, 30000);
        });
    </script>
</body>
</html>
