<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ LogSentinel Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🛡️ LogSentinel Dashboard</h1>
        <p class="subtitle">AI-Powered Log Anomaly Detector</p>
        
        <div class="actions">
            <button class="btn btn-primary" onclick="analyzeLogs()">🔍 Run Anomaly Detection</button>
            <button class="btn btn-secondary" onclick="refreshLogs()">🔄 Refresh Logs</button>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <h3>TOTAL LOGS</h3>
                <div class="value" id="totalLogs">0</div>
            </div>
            <div class="stat-card danger">
                <h3>SUSPICIOUS</h3>
                <div class="value" id="suspiciousLogs">0</div>
            </div>
            <div class="stat-card safe">
                <h3>SECURITY SCORE</h3>
                <div class="value" id="securityScore">100%</div>
            </div>
        </div>
        
        <div class="table-container">
            <table class="logs-table">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Service</th>
                        <th>Message</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="logsBody">
                    <tr>
                        <td colspan="4" style="text-align:center;">Loading logs...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadLogs() {
            try {
                const response = await fetch('/api/logs');
                const logs = await response.json();
                
                const tbody = document.getElementById('logsBody');
                tbody.innerHTML = '';
                
                if (logs.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No logs found</td></tr>';
                    updateStats(0, 0);
                    return;
                }
                
                let suspicious = 0;
                logs.forEach(log => {
                    const row = document.createElement('tr');
                    if (log.suspicion_score === 1) {
                        row.classList.add('suspicious');
                        suspicious++;
                    }
                    row.innerHTML = `
                        <td>${log.timestamp}</td>
                        <td><span class="badge badge-service">${log.service}</span></td>
                        <td>${log.message}</td>
                        <td>
                            <span class="badge ${log.suspicion_score === 1 ? 'badge-danger' : 'badge-safe'}">
                                ${log.suspicion_score === 1 ? '⚠️ SUSPICIOUS' : '✅ NORMAL'}
                            </span>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
                
                updateStats(logs.length, suspicious);
            } catch (error) {
                console.error('Error loading logs:', error);
                document.getElementById('logsBody').innerHTML = 
                    '<tr><td colspan="4" style="text-align:center;color:#ff4757;">Error loading logs</td></tr>';
            }
        }

        function updateStats(total, suspicious) {
            document.getElementById('totalLogs').textContent = total;
            document.getElementById('suspiciousLogs').textContent = suspicious;
            const score = total > 0 ? Math.round(((total - suspicious) / total) * 100) : 100;
            document.getElementById('securityScore').textContent = score + '%';
        }

        async function analyzeLogs() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ Analyzing...';
            
            try {
                const response = await fetch('/api/analyze', { method: 'POST' });
                const result = await response.json();
                
                if (result.status === 'success') {
                    alert(`✅ Analysis complete!\nAnalyzed: ${result.analyzed} logs\nFound: ${result.anomalies} anomalies`);
                    loadLogs();
                } else {
                    alert('⚠️ ' + result.message);
                }
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
            
            btn.disabled = false;
            btn.textContent = '🔍 Run Anomaly Detection';
        }

        async function refreshLogs() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ Refreshing...';
            
            try {
                const response = await fetch('/api/refresh', { method: 'POST' });
                const result = await response.json();
                
                if (result.status === 'refreshed') {
                    alert('✅ Logs refreshed!');
                    loadLogs();
                }
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
            
            btn.disabled = false;
            btn.textContent = '🔄 Refresh Logs';
        }

        // Load logs on page load
        loadLogs();
        // Auto-refresh every 30 seconds
        setInterval(loadLogs, 30000);
    </script>
</body>
</html>
